name: Client Format Analyze Test

defaults:
  run:
    working-directory: das_client

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'das_client/**'
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Format check with line length 120
        run: dart format -l 120 -o none --set-exit-if-changed .

      - name: Setup melos
        uses: bluefireteam/melos-action@v3
        with:
          melos-version: '^6.3.0'
          run-bootstrap: 'false'

      - name: Generate sources
        run: melos generate

      - name: Flutter test
        run: melos test

      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_NEW_TEST }}
        with:
          projectBaseDir: das_client
          args: >
            -Dsonar.organization=schweizerischebundesbahnen
            -Dsonar.projectKey=schweizerischebundesbahnen-DAS-Admin-Tool
            -Dsonar.sources=lib
            -Dsonar.tests=test
            -Dsonar.exclusions=lib/src/fonts/**,lib/src/sbb_map/sbb_map.dart,**/*.g.dart
            -Dsonar.flutter.enabled=true
            -Dsonar.language=dart
            -Dsonar.dart.lcov.reportPaths=coverage/lcov.info
