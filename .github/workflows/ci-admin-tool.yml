name: Continuous Integration Admin-Tool Webapp

defaults:
  run:
    working-directory: das_admin_tool

on:
  push:
    paths:
      - 'das_admin_tool/**'
    branches: [ "main" ]
  pull_request:
    paths:
      - 'das_admin_tool/**'
    branches: [ "main" ]


concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'das_admin_tool/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'das_admin_tool/package-lock.json'
      - run: npm clean-install
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'das_admin_tool/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'das_admin_tool/package-lock.json'
      - run: npm clean-install
      - run: npm test
      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: das_admin_tool
          args: >
            -Dsonar.organization=schweizerischebundesbahnen
            -Dsonar.projectKey=schweizerischebundesbahnen-DAS-Admin-Tool
            -Dsonar.projectName=DAS/Admin-Tool
            -Dsonar.language=ts
            -Dsonar.sources=src/app
            -Dsonar.tests=src/app
            -Dsonar.verbose=true
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts,**/*.module.ts,**/*.routes.ts
            -Dsonar.test.inclusions=src/**/*.spec.ts
            -Dsonar.typescript.lcov.reportPaths=coverage/das_admin_tool/lcov.info
            -Dsonar.testExecutionReportPaths=coverage/das_admin_tool/sonarqube.xml
            -Dsonar.issue.ignore.multicriteria=e1,e2
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey=css:S4667
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey=**
            -Dsonar.issue.ignore.multicriteria.e2.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
            -Dsonar.issue.ignore.multicriteria.e2.resourceKey=**

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'das_admin_tool/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'das_admin_tool/package-lock.json'
      - run: npm clean-install
      - run: npx playwright install --with-deps
        working-directory: das_admin_tool
      - run: npm run e2e
        working-directory: das_admin_tool
        env:
          CI: true
          E2E_LOGIN_USERNAME: ${{ secrets.E2E_LOGIN_USERNAME }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-test-results
          path: das_admin_tool/test-results/
  build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      IMAGE_ID: ghcr.io/${{ github.repository }}/das_admin_tool
      VERSION: main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'das_admin_tool/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'das_admin_tool/package-lock.json'
      - run: npm clean-install
      - run: npm run build:ngssc
      - run: npm run gzip
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
      - name: Create container image
        if: github.ref == 'refs/heads/main'
        run: |
          # Convert to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')
          
          docker build -t $IMAGE_ID:$VERSION .
          docker push $IMAGE_ID:$VERSION
        env:
          DOCKER_BUILDKIT: 1
