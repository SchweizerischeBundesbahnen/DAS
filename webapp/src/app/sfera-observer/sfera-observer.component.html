<h2>SFERA Communication</h2>
@if ((mqService.state | async) !== MqttConnectionState.CONNECTED) {
  <sbb-form-field size="s" class="sbb-form-field-long">
    <label>Company Code</label>
    <input type="text" [formControl]="companyControl"/>
  </sbb-form-field>
  <sbb-form-field size="s" class="sbb-form-field-long">
    <label>Train Identification</label>
    <input type="text" [formControl]="trainControl"/>
  </sbb-form-field>
  <sbb-form-field size="s" class="sbb-form-field-long">
    <label>Operation date</label>
    <input type="text" [formControl]="dateControl"/>
  </sbb-form-field>
  <sbb-form-field size="s" class="sbb-form-field-long">
    <label>Client ID</label>
    <input type="text" [formControl]="clientIdControl"/>
  </sbb-form-field>
  <sbb-checkbox class="checkbox" size="xs" [formControl]="environmentControl">local</sbb-checkbox>
  <sbb-button size="s" (click)="observe()">Observe</sbb-button>
} @else {
  <button type="button" class="disconnect" sbb-button (click)="disconnect()">Disconnect/Change
  </button>

  <div class="messages">
    <div class="title">
      <div><b>B2G</b> {{ b2gTopic }}</div>
      <div><b>G2B</b> {{ g2bTopic }}</div>
    </div>

    @for (message of messages; track $index) {
      <div class="message" [class.left]="message.topic === 'b2g'"
           [class.right]="message.topic === 'g2b'">
        <app-simple-xml [xmlString]="message.message"></app-simple-xml>
      </div>
    }
  </div>
}
