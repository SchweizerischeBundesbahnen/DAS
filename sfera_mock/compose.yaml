services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=driver_advisory_system'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
  sfera-mock:
    build: .
    environment:
      - 'USER=${USER}'
    ports:
      - '8081:8081'
    volumes:
      - '${HOME}/.vault-token:/home/sfera-mock/.vault-token:ro'
