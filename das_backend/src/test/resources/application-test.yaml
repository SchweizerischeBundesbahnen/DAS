spring:
  datasource:
    url: jdbc
    hikari:
      connection-timeout: 2000
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    vault:
      enabled: false
      kv:
        enabled: false
  config:
    import: "optional:vault://"
  kafka:
    consumer:
      group-id: test
      key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
    producer:
      key-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    security:
      protocol: PLAINTEXT
endpoints:
  web:
    cors:
      allowed-origins: ''
auth:
  audience:
    service-name: test
logging:
  url: url
  token: token

aws:
  accessKey: accessKey
  secretKey: secretKey
  bucketName: bucketName

formation:
  kafka:
    bootstrap-server: ''
    group-id: ''
    username: ''
    password: ''
    topic: "formation-test"

sfera:
  version: '4.00'
  source-device: 'TEST'
  recipient: '0033'
  broker-url: test
  oauth-profile: test
  topic-prefix: test/

preload:
  bucket:
    bucketUrl: bucketUrl
    accessKey: accessKey
    accessSecret: accessSecret

trainjourneyplan:
  train-clean-up:
    days: 2
    cron-expression: "-"
  kafka:
    bootstrap-server: ''
    group-id: ''
    username: ''
    password: ''
    timetable-period-topic: period
    timetable-train-topic: train

trainjourneypreloader:
  fetch-cron: '-'
  storage-clean-up:
    hours: 24

proxy:
  base-url: ''
  basic-auth: ''

atlas:
  base-url: ''
  import-cron: '-'

shedlock:
  lock-at-least-for: 0
