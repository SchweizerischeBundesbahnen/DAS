endpoints:
  web:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS}
formation:
  kafka:
    bootstrap-server: ${FORMATION_KAFKA_BOOTSTRAP_SERVER}
    group-id: ${FORMATION_KAFKA_GROUP_ID}
    username: ${FORMATION_KAFKA_API_KEY}
    password: ${FORMATION_KAFKA_API_SECRET}
    topic: ${FORMATION_KAFKA_TOPIC}
  clean-up:
    cron: 0 0 3 * * ?  # every day at 3
    older-than-days: 100
logging:
  url: ${SPLUNK_HEC_URL}
  token: ${SPLUNK_HEC_TOKEN}
aws:
  accessKey: ${AWS_ACCESS_KEY}
  secretKey: ${AWS_SECRET_KEY}
  bucketName: ${AWS_BUCKET_NAME}

sfera:
  major-version: '4'
  version: '4.00'
  source-device: 'BACKEND'
  recipient: '0085'
  broker-url: ${SFERA_BROKER_URL}
  oauth-profile: ${SFERA_BROKER_OAUTH_PROFILE}
  topic-prefix: ${SFERA_BROKER_TOPIC_PREFIX}

preload:
  # adapt corresponding lockAtLeastFor time in @SchedulerLock
  fetch-cron: ${PRELOAD_FETCH_CRON}
  bucket:
    bucketUrl: ${PRELOAD_BUCKET_URL}
    accessKey: ${PRELOAD_BUCKET_KEY}
    accessSecret: ${PRELOAD_BUCKET_SECRET}
  kafka:
    bootstrap-server: ${PRELOAD_KAFKA_BOOTSTRAP_SERVER}
    group-id: ${PRELOAD_KAFKA_GROUP_ID}
    username: ${PRELOAD_KAFKA_API_KEY}
    password: ${PRELOAD_KAFKA_API_SECRET}
    timetablePeriodTopic: ${PRELOAD_KAFKA_TIMETABLE_PERIOD_TOPIC}
    timetableTrainTopic: ${PRELOAD_KAFKA_TIMETABLE_TRAIN_TOPIC}
  trainCleanUp:
    days: ${PRELOAD_CLEANUP_DAYS}
    cronExpression: ${PRELOAD_CLEANUP_CRON}
  storageCleanUp:
    hours: ${PRELOAD_CLEANUP_HOURS}

proxy:
  base-url: ${PROXY_BASE_URL}
  basic-auth: ${PROXY_BASIC_AUTH}

atlas:
  base-url: ${ATLAS_BASE_URL}
  import-cron: 0 0 3 * * ?  # every day at 3
