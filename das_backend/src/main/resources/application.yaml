info:
  app:
    version: '@project.version@'
spring:
  profiles:
    active: ${STAGE:local}
  application:
    name: backend
  web:
    locale: en
    locale-resolver: fixed
  mvc:
    problemdetails:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://login.microsoftonline.com/2cda5d11-f0ac-46b3-967d-af1b2e1bd01a/discovery/v2.0/keys
          issuer-uri: https://login.microsoftonline.com/2cda5d11-f0ac-46b3-967d-af1b2e1bd01a/v2.0
      authorizationUrl: https://login.microsoftonline.com/common/oauth2/v2.0
      client:
        registration:
          azure:
            client-id: ${SFERA_OAUTH_CLIENTID}
            client-secret: ${SFERA_OAUTH_SECRET}
            authorization-grant-type: client_credentials
            scope: ${SFERA_OAUTH_SCOPE}
          atlas:
            client-id: ${SFERA_OAUTH_CLIENTID}
            client-secret: ${SFERA_OAUTH_SECRET}
            authorization-grant-type: client_credentials
            scope: ${ATLAS_OAUTH_SCOPE}
        provider:
          azure:
            token-uri: https://login.microsoftonline.com/2cda5d11-f0ac-46b3-967d-af1b2e1bd01a/oauth2/v2.0/token
          atlas:
            token-uri: https://login.microsoftonline.com/2cda5d11-f0ac-46b3-967d-af1b2e1bd01a/oauth2/v2.0/token
  jackson:
    mapper:
      accept-case-insensitive-enums: true
    time-zone: CET
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
  flyway:
    baseline-on-migrate: true
  kafka:
    consumer:
      properties:
        schema.registry.url: ${KAFKA_SR_URL}
        json:
          value.type: ch.sbb.zis.trainformation.api.model.DailyFormationTrain
          key.type: ch.sbb.zis.trainformation.api.model.DailyFormationTrainKey
          fail.invalid.schema: true
    jaas:
      enabled: true
      login-module: org.apache.kafka.common.security.plain.PlainLoginModule
    security:
      protocol: SASL_SSL
    properties:
      sasl.mechanism: PLAIN
      connections.max.idle.ms: 340000
      basic.auth:
        credentials.source: USER_INFO
        user.info: ${KAFKA_SR_API_KEY}:${KAFKA_SR_API_SECRET}
      schema.registry.url: ${KAFKA_SR_URL}
  jpa:
    hibernate:
      ddl-auto: validate
management:
  endpoint:
    health:
      probes:
        enabled: true
springdoc:
  swagger-ui:
    oauth:
      clientId: ${AUTH_SWAGGER_CLIENT_ID}
      scopes: api://${AUTH_SERVICE_NAME}/.default
      use-pkce-with-authorization-code-grant: true
auth:
  audience:
    service-name: ${AUTH_SERVICE_NAME}
endpoints:
  web:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS}
formation:
  kafka:
    bootstrap-server: ${FORMATION_KAFKA_BOOTSTRAP_SERVER}
    group-id: ${FORMATION_KAFKA_GROUP_ID}
    username: ${FORMATION_KAFKA_API_KEY}
    password: ${FORMATION_KAFKA_API_SECRET}
    topic: ${FORMATION_KAFKA_TOPIC}
  clean-up:
    cron: 0 0 3 * * ?  # every day at 3
    older-than-days: 100
logging:
  url: ${SPLUNK_HEC_URL}
  token: ${SPLUNK_HEC_TOKEN}
aws:
  accessKey: ${AWS_ACCESS_KEY}
  secretKey: ${AWS_SECRET_KEY}
  bucketName: ${AWS_BUCKET_NAME}

sfera:
  major-version: '4'
  version: '4.00'
  source-device: 'BACKEND'
  recipient: '0085'
  broker-url: ${SFERA_BROKER_URL}
  oauth-profile: ${SFERA_BROKER_OAUTH_PROFILE}
  topic-prefix: ${SFERA_BROKER_TOPIC_PREFIX}

preload:
  bucket:
    bucketUrl: ${PRELOAD_BUCKET_URL}
    accessKey: ${PRELOAD_BUCKET_KEY}
    accessSecret: ${PRELOAD_BUCKET_SECRET}

trainjourneyplan:
  kafka:
    bootstrap-server: ${PRELOAD_KAFKA_BOOTSTRAP_SERVER}
    group-id: ${PRELOAD_KAFKA_GROUP_ID}
    username: ${PRELOAD_KAFKA_API_KEY}
    password: ${PRELOAD_KAFKA_API_SECRET}
    timetable-period-topic: ${PRELOAD_KAFKA_TIMETABLE_PERIOD_TOPIC}
    timetable-train-topic: ${PRELOAD_KAFKA_TIMETABLE_TRAIN_TOPIC}
  train-clean-up:
    days: ${PRELOAD_CLEANUP_DAYS}
    cron-expression: ${PRELOAD_CLEANUP_CRON}

trainjourneypreloader:
  # adapt corresponding lockAtLeastFor time in @SchedulerLock
  fetch-cron: ${PRELOAD_FETCH_CRON}
  storage-clean-up:
    hours: ${PRELOAD_CLEANUP_HOURS}

proxy:
  base-url: ${PROXY_BASE_URL}
  basic-auth: ${PROXY_BASIC_AUTH}

atlas:
  base-url: ${ATLAS_BASE_URL}
  import-cron: 0 0 3 * * ?  # every day at 3

admin:
  clean-up:
    cron: 0 0 3 * * ?  # every day at 3
    older-than-days: 90
