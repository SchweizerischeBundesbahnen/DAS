spring:
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./das_backend/.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/driver_advisory_system
    username: myuser
    password: secret
endpoints:
  web:
    cors:
      allowed-origins: http://localhost:4200
formation:
  clean-up:
    cron: '-'
  kafka:
    # disable kafka per default
    enabled: false
trainjourneyplan:
  kafka:
    # disable kafka per default
    enabled: false
    timetable-period-topic: nets-p.timetable
    timetable-train-topic: fps.prod.infra.zug
  train-clean-up:
    cron-expression: "0 0 0 * * *"
    days: 2

trainjourneypreloader:
  storage-clean-up:
    hours: 24
