<app-table-search-header [searchControl]="searchControl" />
<sbb-table-wrapper>
  <table
    [dataSource]="dataSource"
    class="table-truncated"
    fixedLayout
    sbb-table
    sbbSort
    sbbSortActive="companyCode"
    sbbSortDirection="asc"
  >
    <ng-container sbbColumnDef="companyCode">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_feature_toggles_table_column_company"
        sbb-header-cell
        sbb-sort-header="companyCode"
        >EVU</th
      >
      <td *sbbCellDef="let row" sbb-cell
        ><span>{{ companyName(row.companyCode) }}</span></td
      >
    </ng-container>

    <ng-container sbbColumnDef="key">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_feature_toggles_table_column_key"
        sbb-header-cell
        sbb-sort-header="key"
        >Feature</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ featureKeyLabel(row.key) }}</td>
    </ng-container>

    <ng-container sbbColumnDef="enabled">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_feature_toggles_table_column_enabled"
        sbb-header-cell
        sbb-sort-header="enabled"
        >Aktiviert</th
      >
      <td *sbbCellDef="let row" sbb-cell>
        <sbb-toggle-check [checked]="row.enabled" disabled labelPosition="after">
          @if (row.enabled) {
            <span i18n="@@ru_feature_toggles_table_value_true">Ja</span>
          } @else {
            <span i18n="@@ru_feature_toggles_table_value_false">Nein</span>
          }
        </sbb-toggle-check>
      </td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedAt">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_feature_toggles_table_column_last_modified_at"
        sbb-header-cell
        sbb-sort-header="lastModifiedAt"
        >Bearbeitet am</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedAt | date: 'short' }} </td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedBy">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_feature_toggles_table_column_last_modified_by"
        sbb-header-cell
        sbb-sort-header="lastModifiedBy"
        >Bearbeitet von</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedBy }}</td>
    </ng-container>

    <ng-container sbbColumnDef="action">
      <th *sbbHeaderCellDef sbb-header-cell></th>
      <td *sbbCellDef="let ruFeature" sbb-cell>
        <sbb-mini-button (click)="edit(ruFeature)" iconName="pen-small"></sbb-mini-button>
      </td>
    </ng-container>

    <tr *sbbHeaderRowDef="columns" sbb-header-row></tr>
    <tr *sbbRowDef="let row; columns: columns" sbb-row></tr>
  </table>
</sbb-table-wrapper>

<app-table-bottom-bar (addClicked)="add()" [showDelete]="false" />
