<sbb-form-field errorSpace="reserve" class="full-width">
  <label for="category" i18n="@@ru_indications_form_category_label">Kategorie</label>
  <input
    name="category"
    i18n-placeholder="@@ru_indications_form_category_placeholder"
    placeholder="Wählen"
    [formControl]="templateControl"
    [sbbAutocomplete]="auto"
    (input)="onType($event)"
  />
  <sbb-autocomplete #auto="sbbAutocomplete" requireSelection [displayWith]="displayWith">
    @for (value of filteredTemplates(); track value) {
      <sbb-option [value]="value">{{ value.category }}</sbb-option>
    }
  </sbb-autocomplete>
</sbb-form-field>
<app-ru-indication-content-form [form]="languageContentForm" />
