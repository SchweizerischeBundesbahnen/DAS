<app-table-search-header
  [languageControl]="form.controls.language"
  [searchControl]="form.controls.search"
/>
<sbb-table-wrapper>
  <table [dataSource]="dataSource" class="table-truncated" fixedLayout sbb-table sbbSort
         sbbSortActive="title" sbbSortDirection="asc">
    <ng-container sbbColumnDef="select">
      <th *sbbHeaderCellDef sbb-header-cell>
        <sbb-checkbox
          (change)="$event ? parentToggle() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
        >
        </sbb-checkbox>
      </th>
      <td *sbbCellDef="let row" sbb-cell>
        <sbb-checkbox
          (change)="$event ? selection.toggle(row) : null"
          (click)="$event.stopPropagation()"
          [checked]="selection.isSelected(row)"
        >
        </sbb-checkbox>
      </td>
    </ng-container>

    <ng-container sbbColumnDef="title">
      <th
        *sbbHeaderCellDef
        i18n="@@external_links_table_column_title"
        sbb-header-cell
        sbb-sort-header="title"
      >
        Titel
      </th>
      <td *sbbCellDef="let row" sbb-cell><span>{{ currentLanguage(row)?.title }}</span></td>
    </ng-container>

    <ng-container sbbColumnDef="link">
      <th
        *sbbHeaderCellDef
        i18n="@@external_links_table_column_link"
        sbb-header-cell
        sbb-sort-header="link"
      >
        URL
      </th>
      <td *sbbCellDef="let row" sbb-cell><span>{{ currentLanguage(row)?.link }}</span></td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedAt">
      <th
        *sbbHeaderCellDef
        i18n="@@external_links_table_column_last_modified_at"
        sbb-header-cell
        sbb-sort-header="lastModifiedAt"
      >
        Bearbeitet am
      </th>
      <td *sbbCellDef="let row" sbb-cell>
        {{ row.lastModifiedAt | date: 'short' }}
      </td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedBy">
      <th
        *sbbHeaderCellDef
        i18n="@@external_links_table_column_last_modified_by"
        sbb-header-cell
        sbb-sort-header="lastModifiedBy"
      >
        Bearbeitet von
      </th>
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedBy }}</td>
    </ng-container>

    <ng-container sbbColumnDef="action">
      <th *sbbHeaderCellDef sbb-header-cell></th>
      <td *sbbCellDef="let externalLink" sbb-cell>
        <sbb-mini-button (click)="edit(externalLink)" iconName="pen-small"></sbb-mini-button>
      </td>
    </ng-container>

    <tr *sbbHeaderRowDef="columns" sbb-header-row></tr>
    <tr *sbbRowDef="let row; columns: columns" sbb-row></tr>
  </table>
</sbb-table-wrapper>

<app-table-bottom-bar
  (addClicked)="add()"
  (deleteClicked)="deleteSelected()"
  [deleteDisabled]="selection.isEmpty()"
  [deleting]="isDeleting"
  [selectedCount]="selection.selected.length"
/>
