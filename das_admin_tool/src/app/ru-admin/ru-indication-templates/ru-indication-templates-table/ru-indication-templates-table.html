<app-table-search-header
  [languageControl]="form.controls.language"
  [searchControl]="form.controls.search"
/>
<sbb-table-wrapper>
  <table
    class="sbb-table--striped table-truncated table-uniform-2lines"
    fixedLayout
    sbb-table
    sbbSort
    sbbSortDirection="asc"
    [dataSource]="dataSource"
  >
    <ng-container sbbColumnDef="select">
      <th *sbbHeaderCellDef sbb-header-cell>
        <sbb-checkbox
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
          (change)="$event ? parentToggle() : null"
        />
      </th>
      <td *sbbCellDef="let row" sbb-cell>
        <sbb-checkbox
          [checked]="selection.isSelected(row)"
          (change)="$event ? selection.toggle(row) : null"
          (click)="$event.stopPropagation()"
        />
      </td>
    </ng-container>
    <ng-container sbbColumnDef="category">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_indication_templates_table_column_category"
        sbb-header-cell
        sbb-sort-header="category"
        >Kategorie</th
      >
      <td *sbbCellDef="let row" sbb-cell>
        <span>{{ row.category }}</span>
      </td>
    </ng-container>

    <ng-container sbbColumnDef="title">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_indication_templates_table_column_title"
        sbb-header-cell
        sbb-sort-header="title"
        >Titel</th
      >
      <td *sbbCellDef="let row" sbb-cell
        ><span>{{ currentLanguage(row)?.title }}</span></td
      >
    </ng-container>

    <ng-container sbbColumnDef="text">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_indication_templates_table_column_text"
        sbb-header-cell
        sbb-sort-header="text"
        >Text</th
      >
      <td *sbbCellDef="let row" sbb-cell
        ><span>{{ currentLanguage(row)?.text }}</span></td
      >
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedAt">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_indication_templates_table_column_last_modified_at"
        sbb-header-cell
        sbb-sort-header="lastModifiedAt"
        >Bearbeitet am</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedAt | date: 'short' }}</td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedBy">
      <th
        *sbbHeaderCellDef
        i18n="@@ru_indication_templates_table_column_last_modified_by"
        sbb-header-cell
        sbb-sort-header="lastModifiedBy"
        >Bearbeitet von</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedBy }}</td>
    </ng-container>

    <ng-container sbbColumnDef="action">
      <th *sbbHeaderCellDef sbb-header-cell></th>
      <td *sbbCellDef="let ruIndicationTemplate" sbb-cell>
        <sbb-mini-button iconName="pen-small" (click)="edit(ruIndicationTemplate)" />
      </td>
    </ng-container>

    <tr *sbbHeaderRowDef="columns" sbb-header-row></tr>
    <tr *sbbRowDef="let row; columns: columns" sbb-row></tr>
  </table>
</sbb-table-wrapper>

<app-table-bottom-bar
  [deleteDisabled]="selection.isEmpty()"
  [deleting]="isDeleting"
  [selectedCount]="selection.selected.length"
  (addClicked)="add()"
  (deleteClicked)="deleteSelected()"
/>
