<sbb-table-wrapper>
  <table
    class="table-truncated"
    fixedLayout
    sbb-table
    sbbSort
    sbbSortActive="version"
    sbbSortDirection="desc"
    [dataSource]="dataSource"
  >
    <ng-container sbbColumnDef="version">
      <th
        *sbbHeaderCellDef
        i18n="@@app_versions_table_column_version"
        sbb-header-cell
        sbb-sort-header="version"
        >Version</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ row.version }}</td>
    </ng-container>

    <ng-container sbbColumnDef="minimalVersion">
      <th
        *sbbHeaderCellDef
        i18n="@@app_versions_table_column_minimal_version"
        sbb-header-cell
        sbb-sort-header="minimalVersion"
        >Minimale Version</th
      >
      <td *sbbCellDef="let row" sbb-cell>
        <sbb-toggle-check disabled labelPosition="after" [checked]="row.minimalVersion">
          @if (row.minimalVersion) {
            <span i18n="@@app_versions_table_value_true">Ja</span>
          } @else {
            <span i18n="@@app_versions_table_value_false">Nein</span>
          }
        </sbb-toggle-check>
      </td>
    </ng-container>

    <ng-container sbbColumnDef="expiryDate">
      <th
        *sbbHeaderCellDef
        i18n="@@app_versions_table_column_expiry_date"
        sbb-header-cell
        sbb-sort-header="expiryDate"
        >Gültig ab</th
      >
      <td *sbbCellDef="let row" sbb-cell>{{ row.expiryDate | date: 'shortDate' }}</td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedAt">
      <th
        *sbbHeaderCellDef
        i18n="@@app_versions_table_column_last_modified_at"
        sbb-header-cell
        sbb-sort-header="lastModifiedAt"
        >Bearbeitet am</th
      >
      <td *sbbCellDef="let row" class="cell-nowrap" sbb-cell>{{
        row.lastModifiedAt | date: 'short'
      }}</td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedBy">
      <th
        *sbbHeaderCellDef
        i18n="@@app_versions_table_column_last_modified_by"
        sbb-header-cell
        sbb-sort-header="lastModifiedBy"
        >Bearbeitet von</th
      >
      <td *sbbCellDef="let row" class="cell-nowrap" sbb-cell>{{ row.lastModifiedBy }}</td>
    </ng-container>

    <ng-container sbbColumnDef="action">
      <th *sbbHeaderCellDef class="action" sbb-header-cell></th>
      <td *sbbCellDef="let appVersion" class="action" sbb-cell>
        <sbb-mini-button iconName="pen-small" (click)="edit(appVersion)" />
      </td>
    </ng-container>

    <tr *sbbHeaderRowDef="columns" sbb-header-row></tr>
    <tr *sbbRowDef="let row; columns: columns" sbb-row></tr>
  </table>
</sbb-table-wrapper>

<div class="bottom">
  <sbb-compact-paginator [pageSize]="PAGE_SIZE" />
  <sbb-secondary-button i18n="@@app_versions_button_create" iconName="plus-small" (click)="add()"
    >App Version blockieren</sbb-secondary-button
  >
</div>
