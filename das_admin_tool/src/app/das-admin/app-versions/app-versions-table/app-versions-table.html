<sbb-table-wrapper>
  <table [dataSource]=dataSource class="table-truncated" fixedLayout sbb-table sbbSort
         sbbSortActive="version" sbbSortDirection="desc">
    <ng-container sbbColumnDef="version">
      <th *sbbHeaderCellDef i18n="@@app_versions_table_column_version" sbb-header-cell
          sbb-sort-header="version">Version
      </th>
      <td *sbbCellDef="let row" sbb-cell> {{ row.version }}</td>
    </ng-container>

    <ng-container sbbColumnDef="minimalVersion">
      <th *sbbHeaderCellDef i18n="@@app_versions_table_column_minimal_version" sbb-header-cell
          sbb-sort-header="minimalVersion">Minimale Version
      </th>
      <td *sbbCellDef="let row" sbb-cell>
        <sbb-toggle-check [checked]="row.minimalVersion" disabled labelPosition="after">
          @if (row.minimalVersion) {
            <span i18n="@@app_versions_table_value_true">Ja</span>
          } @else {
            <span i18n="@@app_versions_table_value_false">Nein</span>
          }
        </sbb-toggle-check>

      </td>
    </ng-container>

    <ng-container sbbColumnDef="expiryDate">
      <th *sbbHeaderCellDef i18n="@@app_versions_table_column_expiry_date" sbb-header-cell
          sbb-sort-header="expiryDate">Gültig ab
      </th>
      <td *sbbCellDef="let row" sbb-cell> {{ row.expiryDate | date:'shortDate' }}</td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedAt">
      <th *sbbHeaderCellDef i18n="@@app_versions_table_column_last_modified_at"
          sbb-header-cell
          sbb-sort-header="lastModifiedAt">
        Bearbeitet am
      </th>
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedAt | date: 'short' }}
      </td>
    </ng-container>

    <ng-container sbbColumnDef="lastModifiedBy">
      <th *sbbHeaderCellDef i18n="@@app_versions_table_column_last_modified_by"
          sbb-header-cell
          sbb-sort-header="lastModifiedBy">Bearbeitet von
      </th>
      <td *sbbCellDef="let row" sbb-cell>{{ row.lastModifiedBy }}</td>
    </ng-container>


    <ng-container sbbColumnDef="action">
      <th *sbbHeaderCellDef sbb-header-cell></th>
      <td *sbbCellDef="let appVersion" sbb-cell>
        <sbb-mini-button (click)="edit(appVersion)" iconName="pen-small"></sbb-mini-button>
      </td>
    </ng-container>

    <tr *sbbHeaderRowDef="columns" sbb-header-row></tr>
    <tr *sbbRowDef="let row; columns: columns" sbb-row></tr>
  </table>
</sbb-table-wrapper>

<app-table-bottom-bar
  (addClicked)="add()"
  [addLabel]="addLabel"
  [showDelete]="false"
/>
