<sbb-table-wrapper>
  <table sbb-table [dataSource]=dataSource sbbSort sbbSortActive="version" sbbSortDirection="desc">
    <ng-container sbbColumnDef="version">
      <th sbb-header-cell *sbbHeaderCellDef sbb-sort-header="version" i18n="@@app_versions_table_column_version">Version</th>
      <td sbb-cell *sbbCellDef="let row"> {{ row.version }}</td>
    </ng-container>

    <ng-container sbbColumnDef="minimalVersion">
      <th sbb-header-cell *sbbHeaderCellDef sbb-sort-header="minimalVersion" i18n="@@app_versions_table_column_minimal_version">Minimale Version
      </th>
      <td sbb-cell *sbbCellDef="let row">
        <sbb-toggle-check [checked]="row.minimalVersion" disabled labelPosition="after">
          @if (row.minimalVersion) {
            <span i18n="@@app_versions_table_value_true">Ja</span>
          } @else {
            <span i18n="@@app_versions_table_value_false">Nein</span>
          }
        </sbb-toggle-check>

      </td>
    </ng-container>

    <ng-container sbbColumnDef="expiryDate">
      <th sbb-header-cell *sbbHeaderCellDef sbb-sort-header="expiryDate" i18n="@@app_versions_table_column_expiry_date">Gültig ab</th>
      <td sbb-cell *sbbCellDef="let row"> {{ row.expiryDate | date:'shortDate' }}</td>
    </ng-container>

    <ng-container sbbColumnDef="action">
      <th sbb-header-cell *sbbHeaderCellDef class="action"></th>
      <td sbb-cell *sbbCellDef="let appVersion" class="action">
        <sbb-mini-button (click)="edit(appVersion)" iconName="pen-small"></sbb-mini-button>
      </td>
    </ng-container>

    <tr sbb-header-row *sbbHeaderRowDef="columns"></tr>
    <tr sbb-row *sbbRowDef="let row; columns: columns"></tr>
  </table>
</sbb-table-wrapper>

<div class="bottom">
  <sbb-compact-paginator [pageSize]="PAGE_SIZE"></sbb-compact-paginator>
  <sbb-secondary-button iconName="plus-small" (click)="add()" i18n="@@app_versions_button_create">App Version blockieren</sbb-secondary-button>
</div>
