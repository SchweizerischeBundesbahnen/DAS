<sbb-form-field errorSpace="reserve">
  <label i18n="@@form_companies_label">{{ label() }}</label>
  <sbb-chip-group [displayWith]="codeToName" [formControl]="control()" [separatorKeys]="[]" name="companies">
    <input
      [formControl]="inputControl"
      [sbbAutocomplete]="auto"
    />
  </sbb-chip-group>

  <sbb-autocomplete #auto="sbbAutocomplete">
    @for (company of filteredCompanies(); track company.code) {
      <sbb-option [value]="company.code">
        {{ company.name }}
      </sbb-option>
    }
  </sbb-autocomplete>
  @if (control().hasError('required') && control().touched) {
    <sbb-error i18n="@@form_field_error_required">Feld darf nicht leer sein</sbb-error>
  }
</sbb-form-field>
