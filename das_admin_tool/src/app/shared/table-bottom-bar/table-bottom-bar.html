<div class="table-bottom-bar">
  <div class="left">
    <sbb-compact-paginator [pageSize]="PAGE_SIZE" />
  </div>
  <div class="right">
    <sbb-secondary-button iconName="plus-small" (click)="addClicked.emit()">{{
      addLabel()
    }}</sbb-secondary-button>
    @if (showDelete()) {
      <sbb-transparent-button
        i18n="@@button_delete_selected_entries"
        iconName="trash-small"
        [disabled]="deleteDisabled()"
        [loading]="deleting()"
        (click)="deleteClicked.emit()"
      >
        {selectedCount(), plural,
          =0 {Einträge löschen}
          one {Eintrag löschen}
          other {{{ selectedCount() }} Einträge löschen}
        }
      </sbb-transparent-button>
    }
  </div>
</div>
