<sbb-title i18n="@@audit_title" visualLevel="5">Stammdaten</sbb-title>
<div class="entry">
	<p class="sbb-text-xs" i18n="@@audit_label_last_modified_by">Zuletzt bearbeitet von</p>
	<p class="sbb-text-m">{{ data()?.lastModifiedBy }}</p>
</div>
<div class="entry">
	<p class="sbb-text-xs" i18n="@@audit_label_last_modified_at">Bearbeitet am</p>
	<p class="sbb-text-m">{{ data()?.lastModifiedAt | date: 'short' }}</p>
</div>
