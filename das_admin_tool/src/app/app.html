<app-header/>
<app-icon-sidebar>
  @if (isAdBlockerDetected()) {
    <sbb-notification readonly type="warn" animation="none">
      <sbb-title i18n="@@app_notification_adblocker_title">AdBlocker erkannt</sbb-title>
      <span i18n="@@app_notification_adblocker_message">Für die volle Funktionalität dieser Anwendung, deaktiviere bitte deinen AdBlocker.</span>
      <sbb-link href="/" i18n="@@app_notification_adblocker_reload">Neu laden</sbb-link>
    </sbb-notification>
  }
  <router-outlet/>
</app-icon-sidebar>
